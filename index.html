<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4F1C86">
  <meta charset="UTF-8">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <title>Sistema de Colaboradores</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>
  <div id="loader"><div class="spinner"></div></div>
  <div id="menuToggle">
    <input type="checkbox" id="menuCheckbox" />
    <label for="menuCheckbox">SAVOY</label>
    <ul id="menu">
      <li>><a href="#" onclick="mostrarSecao('bancoHoras')">Banco de Horas</a></li>
      <li>><a href="#" onclick="mostrarSecao('requisicoes')">Requisições</a></li>
      <li>><a href="#" onclick="mostrarSecao('codigos')">Leitor de Códigos</a></li>
      <li>><a href="#" onclick="mostrarSecao('hora-a-hora')">Hora A Hora</a></li>
      <li><a href="#" onclick="mostrarSecao('cdc')">Colaboradores</a></li>
    </ul>
  </div>

  <div id="bancoHoras" class="secao">
    <input type="text" onfocus="this.value='';" id="buscaColaborador" placeholder="Digite parte do nome ou matrícula"
      oninput="sugerirColaboradorUnificado('buscaColaborador', 'sugestoesBancoHoras')">
    <div id="sugestoesBancoHoras" class="sugestoes"></div>
    <button onclick="buscarBancoHoras()">Buscar</button>
    <div id="versao"></div>
    <div id="resultado" class="resultado"></div>
  </div>

  <div id="requisicoes" class="secao" onload="carregarRequisicoes();">

    <div id="pesquisaReq">
      <input type="text" onfocus="this.value='';" id="buscaRequisicao2"
        placeholder="Digite o nome do colaborador"><button onclick="buscarRequisicoes()">Buscar</button>
    </div>


    <div id="resultadoBusca"></div>




    <div id="exibePesqReq">
      <button type="button" onclick="pesquisarRequisicoes()">Pesquisar Requisições</button>
    </div>


    <input type="text" onfocus="this.value='';" id="buscaRequisicao" placeholder="Digite o nome do colaborador"
      oninput="sugerirColaboradorUnificado('buscaRequisicao', 'sugestoesColaborador')">
    <div id="sugestoesColaborador" class="sugestoes"></div>

    <div class="qtd_desc">
    <input type="number" id="quantidade" class="quantidade" placeholder="Quantidade" min="1" value="1">
    <select id="descricao" name="descricao" class="descricao">
      <option value="TROCA/DESGASTE NATURAL" class="desc">Troca/Desgaste Natural</option>
      <option value="NECESSIDADE" class="desc necessidade">Necessidade</option>
      <option value="PERDA" class="desc perda">Perda</option>
      <option value="USO COLETIVO" class="desc coletivo">Uso Coletivo</option>
    </select>
  </div>
    <input type="text" placeholder="Digite o nome do EPI" id="epiInput" oninput="sugerirEPIs()">
    <div id="sugestoesEPI" class="sugestoes"></div>

    <ul id="itensRequisicao"></ul>
    <button onclick="criarRequisicao()">Criar Requisição</button>
    <div id="listaRequisicoes"></div>
  </div>

  <div id="codigos" class="secao">



    <div class="container">

      <div id="reader"></div>

      <div class="controls">
        <button id="btnAcessar">Iniciar Leitura</button>
        <button id="btnFechar">Parar Câmera</button>
      </div>

      <div id="output">Aguardando leitura...</div>
    </div>

  </div>


  <div class="secao" id="hora-a-hora">


    <div class="controles">
      <button id="btnAbrir" onclick="iniciarCamera()" style="background-color: var(--primary);">Abrir Câmera</button>
      <button id="btnFecharCam" class="btn-danger" style="display:none; background-color: var(--danger);"
        onclick="pararCamera()">Fechar Câmera</button>
    </div>

    <section id="area-camera" style="display:none;">
      <video id="video" autoplay playsinline></video>
      <div class="acoes-camera">
        <div class="radio-group">
          <label class="radio-btn"><input type="radio" name="linha" value="L01" checked> L01</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L02"> L02</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L03"> L03</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L05"> L05</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L06"> L06</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L07"> L07</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L08"> L08</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L09"> L09</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L10"> L10</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L11"> L11</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L12"> L12</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L13"> L13</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L22"> L22</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L23"> L23</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L24"> L24</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L26"> L26</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L27"> L27</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L35"> L35</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L37"> L37</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L46"> L46</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L55"> L55</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L56"> L56</label>
          <label class="radio-btn"><input type="radio" name="linha" value="L59"> L59</label>
        </div>


        <div class="radio-group">
          <label class="radio-btn"><input type="radio" name="tipo" value="caderno" checked> Caderno</label>
          <label class="radio-btn"><input type="radio" name="tipo" value="quadro"> Quadro</label>
          <label class="radio-btn"><input type="radio" name="tipo" value="os"> O.S.</label>
        </div>

        <button onclick="tirarFoto()" style="background-color: var(--primary); margin-top: 15px;">📸 CAPTURAR
          IMAGEM</button>
      </div>
    </section>

    <div id="container-linhas">
    </div>

    <div id="modalZoom" class="modal" onclick="this.style.display='none'">
      <span class="close">&times;</span>
      <img class="modal-content" id="imgZoom">
    </div>

    <canvas id="canvas" style="display:none;"></canvas>


  </div>

  <div id="cdc" class="secao">
    <input type="text" placeholder="Digite o CDC">
    <button onclick="listarCDC()">Buscar CDC</button>
    <div id="detalhesColaborador">
    </div>
    <div id="resultadoCDC" class="tabelaCDC"></div>

  </div>

  <script src="script.js"></script>
  
</body>

</html>
