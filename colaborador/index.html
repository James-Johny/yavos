<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05125e">
    <meta charset="UTF-8">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <title>Solicitação de requisições</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <div id="pwa-install-banner"
        style="display: none; top: 0; left: 0; flex-flow: column wrap; background: var(--purple1); color: white; padding: 15px; text-align: center; font-family: sans-serif; position: fixed; z-index: 9999; min-width: 100%; min-height: 100%;">
        <p style="margin: 100px 0 100px 0; font-size: 60px;">Instale o App para solicitar as Requisições mais
            rápido!</p>
        <div style="display: flex; flex-flow: column wrap; justify-content: center; align-items: center; gap: 10px;">
            <br>
            <button id="btn-instalar-pwa"
                style="background: white; color: var(--purple1); border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">Instalar
                Agora</button><br>
            <button onclick="document.getElementById('pwa-install-banner').style.display='none'"
                style="background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Depois</button><br>
        </div>
    </div>

    <div id="loader">
        <div class="spinner"></div>
    </div>
    <div id="menuToggle">
        <input type="checkbox" id="menuCheckbox" />
        <label for="menuCheckbox" onclick="window.location.href='index.html'">SAVOY</label>

    </div>
    <div class="navbar-bottom">
        <span onclick="secao('requisicoes')" class="button-bottom" id="requisicao"></span>
        <span onclick="secao('bancoHoras')" class="button-bottom" id="bancodehoras"></span>
        <span onclick="secao('program')" class="button-bottom" id="velocidade"></span>
        <span onclick="secao('velocidad')" class="button-bottom" id="programacao"></span>

    </div>

    <!-----------------------     Banco de Horas      --------------------------->

    <div id="bancoHoras" class="secao" style="display: none">
        <input type="text" onfocus="this.value='';" id="buscaColaborador"
            placeholder="Digite parte do nome ou matrícula"
            oninput="sugerirColaboradorUnificado('buscaColaborador', 'sugestoesBancoHoras')">
        <div id="sugestoesBancoHoras" class="sugestoes"></div>
        <button onclick="buscarBancoHoras()">Buscar</button>
        <div id="versao"></div>
        <div id="resultado" class="resultado"></div>
    </div>


    <!-----------------------   Requisições   -------------------------->
    <div class="secao" id="requisicoes" style="margin-bottom: 12rem; display: flex;"
        onload="carregarRequisicoesColaborador()">




        <div id="resultadoBusca"></div>


        <input type="text" onfocus="this.value='';" id="buscaRequisicao"
            placeholder="Ex: Nome,Matricula (Fulano,111111)"
            oninput="sugerirColaboradorUnificado('buscaRequisicao', 'sugestoesColaborador')">
        <div id="sugestoesColaborador" class="sugestoes"></div>

        <div class="qtd_desc">
            <table style="border: none; width: 15rem; margin-left: 2rem; background-color: transparent;">
                <tr style="background-color: transparent; text-align: right;">
                    <td style="width: 15rem;"><span>Quantidade: </span></td>
                    <td><input type="number" id="quantidade" onfocus="this.value='';" class="quantidade"
                            placeholder="Quantidade" min="1" value="1" style="width: 2rem !important;"></td>
                </tr>
            </table>

            <select id="descricao" name="descricao" class="descricao">
                <option value="TROCA/DESGASTE NATURAL" class="desc">Troca/Desgaste Natural</option>
                <option value="NECESSIDADE" class="desc necessidade">Necessidade</option>
                <option value="PERDA" class="desc perda">Perda</option>
                <option value="USO COLETIVO" class="desc coletivo">Uso Coletivo</option>
            </select>
        </div>
        <input type="text" placeholder="Digite o nome do EPI" id="epiInput" oninput="sugerirEPIs()">
        <div id="sugestoesEPI" class="sugestoes"></div>

        <ul id="itensRequisicao"></ul>
        <button onclick="criarRequisicao()">Criar Requisição</button>
        <div id="listaRequisicoes"></div>
    </div>

    <!-----------------------     Programação      -------------------------->

    <div class="secao" id="velocidad" style="display: none;">

        <div class="select-setor">
                Setor: <select id="setorSelect" onchange="trocarSetor()">
                    <option value="rapidas">Rápidas</option>
                    <option value="lineares">Lineares</option>
                    <option value="esmalte">Esmalte</option>
                </select>

            </div>
        <div id="status">Aguardando inicialização...</div>
        <div class="table-container" id="planilha-container"></div>

    </div>



    <!-----------------------     Xadrez       ---------------------->


    <div class="secao" id="program" style="display: none;">

      
        <div id="canva">
                      <canvas id="pdf-canvas"></canvas>
        </div>

        



    </div>





    <!------------------------    Treinamentos     ------------------------>
    <section id="treinamentos" style="display: none;">
        <div class="soon"></div>
    </section>




    <!------------------------    Scripts   ----------------------->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://mozilla.github.io/pdf.js/build/pdf.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="svg.js"></script>
    <script src="xadrez.js"></script>
    <script src="programacao.js"></script>
    <script src="treinamentos.js"></script>
    <script src="colab.js"></script>
    <script src="script.js"></script>

</body>

</html>
