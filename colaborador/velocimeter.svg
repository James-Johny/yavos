<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer gauge circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="4"/>
  
 
  
  <!-- Tick marks and numbers - major ticks at 0, 40, 80, 120, 160, 200, 240 -->
  <!-- 0 (left - 135°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2.5" transform="rotate(-135 50 50)"/>
  
  <!-- 40 (left-ish - 90°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2" transform="rotate(-90 50 50)"/>
  
  <!-- 80 (top-left - 45°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2" transform="rotate(-45 50 50)"/>
  
  <!-- 120 (top - 0°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2.5" transform="rotate(0 50 50)"/>
  
  <!-- 160 (top-right - 45°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2" transform="rotate(45 50 50)"/>
  
  <!-- 200 (right - 90°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2" transform="rotate(90 50 50)"/>
  
  <!-- 240 (bottom-right - 135°) -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#ccc" stroke-width="2.5" transform="rotate(135 50 50)"/>
  
  <!-- Small tick marks between major ticks -->
  <!-- Between 0 and 40 (every 8 units on 135° to 90° range) -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-123.75 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-112.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-101.25 50 50)"/>
  
  <!-- Between 40 and 80 -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-78.75 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-67.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-56.25 50 50)"/>
  
  <!-- Between 80 and 120 -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-33.75 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-22.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(-11.25 50 50)"/>
  
  <!-- Between 120 and 160 -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(11.25 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(22.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(33.75 50 50)"/>
  
  <!-- Between 160 and 200 -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(56.25 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(67.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(78.75 50 50)"/>
  
  <!-- Between 200 and 240 -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(101.25 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(112.5 50 50)"/>
  <line x1="50" y1="10" x2="50" y2="15" stroke="#b1edf1" stroke-width="1" transform="rotate(123.75 50 50)"/>
  
  <!-- Needle pointing at 160 (45° angle) -->
  <polygon points="50,52 49,48 50,20 51,48" fill="white" transform="rotate(45 50 50)"/>
  
  <!-- Center cap -->
  <circle cx="50" cy="50" r="4" fill="white"/>
  <circle cx="50" cy="50" r="2" fill="white"/>
  
  <!-- Red zone indicator (right side, 200-240 area) -->
  <path d="M 85 65 A 40 40 0 0 1 65 85" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- km/h label -->
  <text x="50" y="76" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle">un/m</text>

   <!-- Inner gauge ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ddd" stroke-width="1.5"/>
</svg>